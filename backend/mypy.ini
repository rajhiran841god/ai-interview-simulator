# Project-wide mypy configuration.
#
# Background: during the 10-module build, the same class of bug (a
# function/method parameter or return type declared as plain `str`
# when the actual value is a narrower Literal type, e.g. QuestionType,
# Relation, Emphasis, DecisionStrategy) was independently caught by
# mypy in 5 separate modules. Verified retroactively that stricter
# settings (below) do NOT surface any new issues in the current
# codebase — the historical fixes were correct and complete — but this
# config exists so the SAME class of bug is caught automatically going
# forward, rather than relying on remembering to run extra flags.
[mypy]
ignore_missing_imports = True
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True

# app/core/config.py has one known, pre-existing false positive
# (pydantic-settings populates fields from environment variables at
# runtime, not constructor arguments — mypy can't see that). This is
# Milestone 1 code, documented as out of scope for later modules to
# fix. Excluded here rather than left as an unexplained recurring
# error every CI run.
[mypy-app.core.config]
ignore_errors = True
